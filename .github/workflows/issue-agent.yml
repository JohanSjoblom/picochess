name: Issue Agent

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: read

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install requests

      - name: Run agent
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python tools/issue_agent.py
