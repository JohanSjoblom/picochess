name: Issue Agent

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to check. Leave empty to check the first open issue.
        required: false
        type: string

permissions:
  contents: read
  issues: write

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Show current files
        run: |
          git branch --show-current
          git rev-parse --short HEAD
          cat .github/workflows/issue-agent.yml
          ls -la tools

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install requests

      - name: Run agent
        env:
          GITHUB_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          python tools/issue_agent.py
